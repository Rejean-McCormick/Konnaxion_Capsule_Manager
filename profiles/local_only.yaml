# Konnaxion network profile: local_only
#
# Purpose:
#   Demo or maintenance use on the same machine only.
#
# Safety rule:
#   No LAN, VPN, tunnel, or public exposure. No internal Konnaxion service ports
#   are exposed directly. Runtime access must stay bound to loopback.

schema_version: kx-network-profile/v1

profile:
  name: local_only
  label: Local only
  description: Accessible only from the local machine.
  default: false
  enabled_by_default: false

network:
  network_profile: local_only
  bind_scope: loopback
  binding: loopback
  bind_hosts:
    - 127.0.0.1
    - ::1
  allow_lan: false
  allow_vpn: false
  allow_tunnel: false
  allow_public_internet: false

exposure:
  mode: private
  public_allowed: false
  requires_expiration: false
  public_mode_enabled: false
  public_mode_expires_at: null

entrypoints:
  traefik:
    enabled: true
    service: traefik
    public: false
    lan: false
    loopback_only: true
    ports: []

routing:
  enabled: true
  host: konnaxion.localhost
  routes:
    "/":
      service: frontend-next
      internal_port: 3000
    "/api/":
      service: django-api
      internal_port: 5000
    "/admin/":
      service: django-api
      internal_port: 5000
    "/media/":
      service: media-nginx
      internal_port: 80

services:
  public_entrypoint:
    - traefik
  direct_public_access_allowed: false
  routed_services:
    - frontend-next
    - django-api
    - media-nginx
  internal_only:
    - frontend-next
    - django-api
    - postgres
    - redis
    - celeryworker
    - celerybeat
    - flower
    - media-nginx
    - kx-agent
  forbidden_public:
    - frontend-next
    - django-api
    - postgres
    - redis
    - celeryworker
    - celerybeat
    - flower
    - media-nginx
    - kx-agent

service_exposure:
  traefik: loopback
  frontend-next: internal
  django-api: internal
  postgres: internal
  redis: internal
  celeryworker: internal
  celerybeat: internal
  flower: private
  media-nginx: internal
  kx-agent: local_only

ports:
  allowed_entry_ports: []
  restricted_admin_ports:
    - 22
  forbidden_public_ports:
    - 80
    - 443
    - 3000
    - 5000
    - 5432
    - 6379
    - 5555
    - 8000
  docker_daemon_tcp_public: false
  docker_socket_mount_allowed: false

firewall:
  mode: deny_by_default
  allow_inbound: []
  deny_public_inbound:
    - port: 22
      protocol: tcp
      purpose: ssh_not_public_for_local_only_profile
    - port: 80
      protocol: tcp
      purpose: http_not_public_for_local_only_profile
    - port: 443
      protocol: tcp
      purpose: https_not_public_for_local_only_profile
    - port: 3000
      protocol: tcp
      purpose: frontend_next_direct_forbidden
    - port: 5000
      protocol: tcp
      purpose: django_api_direct_forbidden
    - port: 5432
      protocol: tcp
      purpose: postgres_forbidden
    - port: 6379
      protocol: tcp
      purpose: redis_forbidden
    - port: 5555
      protocol: tcp
      purpose: flower_forbidden
    - port: 8000
      protocol: tcp
      purpose: django_dev_server_forbidden
  deny_all_other_inbound: true

security:
  require_signed_capsule: true
  require_security_gate: true
  allow_unknown_images: false
  allow_privileged_containers: false
  allow_host_network: false
  allow_docker_socket_mount: false
  require_firewall_check: true
  require_admin_surface_private: true

security_gate:
  required: true
  blocking: true
  blocking_checks:
    - capsule_signature
    - image_checksums
    - manifest_schema
    - secrets_present
    - secrets_not_default
    - dangerous_ports_blocked
    - postgres_not_public
    - redis_not_public
    - docker_socket_not_mounted
    - no_privileged_containers
    - no_host_network
    - allowed_images_only
  warn_checks:
    - firewall_enabled
    - admin_surface_private
    - backup_configured
  checks:
    capsule_signature: required
    image_checksums: required
    manifest_schema: required
    secrets_present: required
    secrets_not_default: required
    dangerous_ports_blocked: required
    postgres_not_public: required
    redis_not_public: required
    docker_socket_not_mounted: required
    no_privileged_containers: required
    no_host_network: required
    allowed_images_only: required
    firewall_enabled: warn
    admin_surface_private: warn
    backup_configured: warn

runtime_policy:
  require_signed_capsule: true
  generate_secrets_on_install: true
  allow_unknown_images: false
  allow_privileged_containers: false
  allow_docker_socket_mount: false
  allow_host_network: false
  require_firewall: true
  require_https: false
  require_tunnel_expiration: false
  auto_disable_public_mode_on_expiry: false

canonical_env:
  KX_NETWORK_PROFILE: local_only
  KX_EXPOSURE_MODE: private
  KX_PUBLIC_MODE_ENABLED: "false"
  KX_PUBLIC_MODE_EXPIRES_AT: ""
  KX_HOST: konnaxion.localhost
  KX_REQUIRE_SIGNED_CAPSULE: "true"
  KX_GENERATE_SECRETS_ON_INSTALL: "true"
  KX_ALLOW_UNKNOWN_IMAGES: "false"
  KX_ALLOW_PRIVILEGED_CONTAINERS: "false"
  KX_ALLOW_DOCKER_SOCKET_MOUNT: "false"
  KX_ALLOW_HOST_NETWORK: "false"
  KX_BACKUP_ENABLED: "true"

backup:
  enabled: true
  root: /opt/konnaxion/backups
  retention:
    daily_days: 14
    weekly_weeks: 8
    monthly_months: 12
    pre_update_count: 5
    pre_restore_count: 5

operator_notes:
  - This profile is for same-machine demo or maintenance use only.
  - Do not expose LAN, VPN, tunnel, or public Internet access.
  - Internal service ports must remain private.
  - Use intranet_private for LAN access.