# Konnaxion Network Profile: offline
#
# Purpose:
#   No external network exposure.
#
# Rules:
#   - Public mode is disabled.
#   - LAN access is disabled.
#   - Tunnel access is disabled.
#   - No host ports are published.
#   - Traefik public entrypoints are disabled by the Agent-rendered runtime.
#   - Internal service ports remain internal only.
#   - No automatic certificate or public DNS workflow is allowed.
#
# Canonical values:
#   KX_NETWORK_PROFILE=offline
#   KX_EXPOSURE_MODE=private
#   KX_PUBLIC_MODE_ENABLED=false

schema_version: kx-network-profile/v1

profile:
  name: offline
  display_name: Offline
  description: No external network exposure. Runtime services are isolated and not reachable from LAN or Internet.
  default: false

exposure:
  mode: private
  public_allowed: false
  lan_allowed: false
  tunnel_allowed: false
  temporary_public_allowed: false
  requires_expiration: false

canonical_env:
  KX_NETWORK_PROFILE: offline
  KX_EXPOSURE_MODE: private
  KX_PUBLIC_MODE_ENABLED: "false"
  KX_PUBLIC_MODE_DURATION_HOURS: ""
  KX_PUBLIC_MODE_EXPIRES_AT: ""
  KX_HOST: ""

routing:
  enabled: false
  traefik_enabled: false
  public_entrypoint_enabled: false
  lan_entrypoint_enabled: false
  tunnel_entrypoint_enabled: false
  allowed_external_paths: []
  hostnames: []
  routes: {}
  tls:
    enabled: false
    certificate_source: none
    public_dns_required: false

entrypoints:
  traefik:
    enabled: false
    public: false
    lan: false
    tunnel: false
    ports: []

services:
  public_entrypoint: null
  direct_public_access_allowed: false
  routed_services: []
  internal_only:
    - frontend-next
    - django-api
    - postgres
    - redis
    - celeryworker
    - celerybeat
    - flower
    - media-nginx
    - kx-agent
  forbidden_public:
    - traefik
    - frontend-next
    - django-api
    - postgres
    - redis
    - celeryworker
    - celerybeat
    - flower
    - media-nginx
    - kx-agent

ports:
  publish:
    http_80: false
    https_443: false
    ssh_22: false
  allowed_entry_ports: []
  forbidden_public_ports:
    - 3000
    - 5000
    - 5432
    - 6379
    - 5555
    - 8000
  docker_daemon_tcp_public: false
  docker_socket_mount_allowed: false

firewall:
  policy: deny_all_inbound
  allow_inbound: []
  deny_inbound:
    - port: 80
      protocol: tcp
      reason: Offline profile does not publish HTTP.
    - port: 443
      protocol: tcp
      reason: Offline profile does not publish HTTPS.
    - port: 22
      protocol: tcp
      reason: Offline profile does not publish SSH.
    - port: 3000
      protocol: tcp
      reason: Next.js direct port must never be public.
    - port: 5000
      protocol: tcp
      reason: Django/Gunicorn direct port must never be public.
    - port: 5432
      protocol: tcp
      reason: PostgreSQL must never be public.
    - port: 6379
      protocol: tcp
      reason: Redis must never be public.
    - port: 5555
      protocol: tcp
      reason: Flower dashboard must never be public.
    - port: 8000
      protocol: tcp
      reason: Django development server must never be public.
  deny_all_other_inbound: true

compose_overrides:
  traefik:
    enabled: false
    publish_ports: []
  networks:
    kx-public:
      enabled: false
    kx-internal:
      enabled: true
      internal: true
  services:
    frontend-next:
      expose:
        - 3000
      publish_ports: []
    django-api:
      expose:
        - 5000
      publish_ports: []
    postgres:
      expose:
        - 5432
      publish_ports: []
    redis:
      expose:
        - 6379
      publish_ports: []
    celeryworker:
      expose: []
      publish_ports: []
    celerybeat:
      expose: []
      publish_ports: []
    flower:
      enabled: false
      expose:
        - 5555
      publish_ports: []
    media-nginx:
      expose:
        - 80
      publish_ports: []
    kx-agent:
      expose: []
      publish_ports: []

security_gate:
  required: true
  blocking_checks:
    - capsule_signature
    - image_checksums
    - manifest_schema
    - secrets_present
    - secrets_not_default
    - dangerous_ports_blocked
    - postgres_not_public
    - redis_not_public
    - docker_socket_not_mounted
    - no_privileged_containers
    - no_host_network
    - allowed_images_only
  warn_checks:
    - firewall_enabled
    - admin_surface_private
    - backup_configured
  expected_results:
    capsule_signature: PASS
    image_checksums: PASS
    manifest_schema: PASS
    secrets_present: PASS
    secrets_not_default: PASS
    firewall_enabled: WARN
    dangerous_ports_blocked: PASS
    postgres_not_public: PASS
    redis_not_public: PASS
    docker_socket_not_mounted: PASS
    no_privileged_containers: PASS
    no_host_network: PASS
    allowed_images_only: PASS
    admin_surface_private: PASS
    backup_configured: PASS

backup:
  enabled: true
  root: /opt/konnaxion/backups
  pre_update_backup_required: true
  pre_restore_backup_required: true

operator_notes:
  - Use this profile for disconnected demos, maintenance, or isolated restore validation.
  - The instance may run internally, but the Manager must not expose a user-facing URL.
  - Switch to local_only when loopback operator access is required.
  - Switch to intranet_private when LAN operator access is required.